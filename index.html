<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap & Track - Smart Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neonBlue: '#00f3ff',
                        neonGreen: '#00ff66',
                        neonOrange: '#ff9900',
                        neonRed: '#ff003c',
                        darkBg: '#0f172a',
                        cardBg: '#1e293b'
                    },
                    animation: {
                        'radar-ping': 'radar 1.5s cubic-bezier(0, 0, 0.2, 1) infinite',
                    },
                    keyframes: {
                        radar: {
                            '75%, 100%': { transform: 'scale(1.5)', opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Classe CSS pour faire clignoter la zone sur la carte SVG */
        .blink-active {
            fill: #ff003c !important;
            filter: drop-shadow(0 0 10px #ff003c);
            transition: all 0.3s ease;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-darkBg text-white font-sans min-h-screen p-4 md:p-8">

    <header class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-neonBlue via-neonGreen to-neonOrange mb-2">
            Tap & Track 📡
        </h1>
        <p class="text-gray-400">Gestionnaire d'Inventaire NFC Intelligent</p>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="space-y-8">
            
            <section class="bg-cardBg p-6 rounded-2xl border border-gray-700 shadow-[0_0_15px_rgba(0,243,255,0.1)]">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span class="text-neonBlue">📱</span> Simulateur de Scan NFC
                </h2>
                <div class="flex flex-col gap-4">
                    <p class="text-sm text-gray-400">1. Tu scannes l'objet, 2. Tu scannes le lieu.</p>
                    <div class="flex gap-2">
                        <select id="sim-item" class="bg-gray-800 border border-gray-600 rounded-lg p-2 text-white flex-1 focus:outline-none focus:border-neonBlue">
                            <option value="item1">🔌 Câble iPhone</option>
                            <option value="item2">🛠️ Tournevis</option>
                            <option value="item3">📚 Livre Node.js</option>
                            <option value="item4">🔋 Piles AA</option>
                        </select>
                        <select id="sim-location" class="bg-gray-800 border border-gray-600 rounded-lg p-2 text-white flex-1 focus:outline-none focus:border-neonGreen">
                            <option value="A3">Tiroir A3 (Chambre)</option>
                            <option value="B2">Boîte B2 (Cuisine)</option>
                            <option value="C1">Étagère C1 (Garage)</option>
                        </select>
                    </div>
                    <button onclick="simulateNFCScan()" class="w-full bg-gradient-to-r from-neonBlue to-blue-600 hover:from-blue-500 hover:to-neonBlue text-white font-bold py-2 px-4 rounded-lg transition-all shadow-[0_0_10px_rgba(0,243,255,0.4)] hover:shadow-[0_0_20px_rgba(0,243,255,0.6)]">
                        Lier (BIP !)
                    </button>
                </div>
            </section>

            <section>
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span class="text-neonGreen">📦</span> Mon Inventaire
                </h2>
                <div id="inventory-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    </div>
            </section>
        </div>

        <section class="bg-cardBg p-6 rounded-2xl border border-gray-700 flex flex-col items-center">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 w-full">
                <span class="text-neonOrange">🗺️</span> Carte de la Maison
            </h2>
            
            <div class="w-full max-w-md relative bg-gray-800 rounded-xl p-4 border border-gray-700">
                <svg viewBox="0 0 400 300" class="w-full h-auto" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#334155" stroke-width="0.5"/>
                        </pattern>
                    </defs>
                    
                    <rect width="400" height="300" fill="url(#grid)" />

                    <rect x="20" y="20" width="160" height="120" fill="#1e3a8a" fill-opacity="0.3" stroke="#00f3ff" stroke-width="2" rx="4"/>
                    <text x="30" y="40" fill="#00f3ff" font-size="12" font-weight="bold">Chambre (A)</text>
                    <rect id="loc-A1" x="30" y="50" width="40" height="30" fill="#334155" rx="2" class="cursor-pointer transition-colors"/>
                    <text x="40" y="70" fill="white" font-size="10">A1</text>
                    
                    <rect id="loc-A3" x="80" y="50" width="40" height="30" fill="#334155" rx="2" class="cursor-pointer transition-colors"/>
                    <text x="90" y="70" fill="white" font-size="10">A3</text>

                    <rect x="200" y="20" width="180" height="120" fill="#064e3b" fill-opacity="0.3" stroke="#00ff66" stroke-width="2" rx="4"/>
                    <text x="210" y="40" fill="#00ff66" font-size="12" font-weight="bold">Cuisine (B)</text>
                    <rect id="loc-B2" x="210" y="50" width="50" height="40" fill="#334155" rx="2" class="cursor-pointer transition-colors"/>
                    <text x="225" y="75" fill="white" font-size="10">B2</text>

                    <rect x="20" y="160" width="360" height="120" fill="#7c2d12" fill-opacity="0.3" stroke="#ff9900" stroke-width="2" rx="4"/>
                    <text x="30" y="180" fill="#ff9900" font-size="12" font-weight="bold">Garage (C)</text>
                    <rect id="loc-C1" x="30" y="190" width="80" height="60" fill="#334155" rx="2" class="cursor-pointer transition-colors"/>
                    <text x="55" y="225" fill="white" font-size="14">C1</text>
                </svg>
            </div>
            <p id="map-status" class="mt-4 text-gray-400 text-sm h-5 text-center">Clique sur "Localiser" pour trouver un objet sur la carte.</p>
        </section>
    </div>

    <script>
        // Base de données simulée
        let items = [
            { id: 'item1', name: 'Câble iPhone', icon: '🔌', locationId: 'A3', room: 'Chambre', colorType: 'blue' },
            { id: 'item2', name: 'Tournevis', icon: '🛠️', locationId: 'C1', room: 'Garage', colorType: 'orange' },
            { id: 'item3', name: 'Livre Node.js', icon: '📚', locationId: 'A1', room: 'Chambre', colorType: 'blue' },
            { id: 'item4', name: 'Piles AA', icon: '🔋', locationId: 'B2', room: 'Cuisine', colorType: 'green' }
        ];

        // Configuration des couleurs selon la zone
        const colors = {
            blue: { border: 'border-neonBlue', text: 'text-neonBlue', bg: 'bg-blue-900/20' },
            green: { border: 'border-neonGreen', text: 'text-neonGreen', bg: 'bg-green-900/20' },
            orange: { border: 'border-neonOrange', text: 'text-neonOrange', bg: 'bg-orange-900/20' }
        };

        // Fonction pour afficher l'inventaire
        function renderInventory() {
            const container = document.getElementById('inventory-list');
            container.innerHTML = ''; // On vide avant de redessiner

            items.forEach(item => {
                const theme = colors[item.colorType];
                
                // Création de la "Card"
                const cardHTML = `
                    <div class="${theme.bg} ${theme.border} border border-opacity-50 rounded-xl p-4 flex items-center justify-between transition-transform hover:scale-105">
                        <div class="flex items-center gap-3">
                            <div class="text-3xl">${item.icon}</div>
                            <div>
                                <h3 class="font-bold text-white text-sm">${item.name}</h3>
                                <p class="text-xs text-gray-400">📍 ${item.room} - ${item.locationId}</p>
                            </div>
                        </div>
                        <button onclick="locateOnMap('${item.locationId}', '${item.name}')" class="text-gray-400 hover:${theme.text} transition-colors p-2" title="Localiser">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </button>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Fonction pour faire clignoter la carte
        function locateOnMap(locId, itemName) {
            // 1. Enlever le clignotement précédent
            document.querySelectorAll('rect').forEach(el => el.classList.remove('blink-active'));
            
            // 2. Trouver le nouvel élément et le faire clignoter
            const targetElement = document.getElementById(`loc-${locId}`);
            if(targetElement) {
                targetElement.classList.add('blink-active');
                document.getElementById('map-status').innerHTML = `<span class="text-neonRed font-bold">${itemName}</span> se trouve ici : <span class="text-white">${locId}</span> !`;
            }
        }

        // Simulation du double scan NFC
        function simulateNFCScan() {
            const itemId = document.getElementById('sim-item').value;
            const newLocId = document.getElementById('sim-location').value;
            
            // Logique pour trouver la pièce et la couleur selon le tiroir
            let newRoom = '';
            let newColor = '';
            if (newLocId.startsWith('A')) { newRoom = 'Chambre'; newColor = 'blue'; }
            else if (newLocId.startsWith('B')) { newRoom = 'Cuisine'; newColor = 'green'; }
            else if (newLocId.startsWith('C')) { newRoom = 'Garage'; newColor = 'orange'; }

            // Mise à jour de la base de données
            const itemIndex = items.findIndex(i => i.id === itemId);
            if (itemIndex > -1) {
                items[itemIndex].locationId = newLocId;
                items[itemIndex].room = newRoom;
                items[itemIndex].colorType = newColor;
            }

            // Rafraîchissement de la vue
            renderInventory();
            
            // Petit feedback visuel de succès
            const btn = document.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "✔️ Enregistré !";
            btn.classList.add('bg-neonGreen', 'text-black');
            
            // Auto-localisation sur la carte
            locateOnMap(newLocId, items[itemIndex].name);

            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('bg-neonGreen', 'text-black');
            }, 1500);
        }

        // Initialisation au chargement
        window.onload = renderInventory;
    </script>
</body>
</html>
