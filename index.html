<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tap & Track — NFC Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080808;
    --surface:  #0e0e0e;
    --surface2: #141414;
    --border:   #1e1e1e;
    --border2:  #2a2a2a;
    --amber:    #f59e0b;
    --amber2:   #fbbf24;
    --cyan:     #22d3ee;
    --violet:   #a78bfa;
    --red:      #f87171;
    --orange:   #fb923c;
    --text:     #d4d4d4;
    --muted:    #555;
    --mono:     'Share Tech Mono', monospace;
    --cond:     'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── HEADER ── */
  #header {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  #logo {
    background: var(--amber); color: #000;
    font-family: var(--cond); font-weight: 900; font-size: 18px;
    letter-spacing: 1px; padding: 5px 10px; border-radius: 3px;
  }
  #appTitle { line-height: 1.1; }
  #appTitle .name { font-family: var(--cond); font-weight: 900; font-size: 17px; color: #fff; letter-spacing: 3px; }
  #appTitle .sub  { font-size: 8px; color: var(--muted); letter-spacing: 2px; }
  #stats { display: flex; gap: 20px; margin-left: auto; }
  .stat { text-align: center; }
  .stat .val { font-family: var(--cond); font-weight: 900; font-size: 22px; line-height: 1; }
  .stat .lbl { font-size: 8px; color: var(--muted); letter-spacing: 1px; }
  #nfc-btn {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    font-family: var(--mono); font-size: 11px; padding: 8px 14px; border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .15s;
  }
  #nfc-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  #nfc-btn.active { border-color: var(--cyan); color: var(--cyan); background: #22d3ee12; animation: pulse-border 1.5s ease-in-out infinite; }
  #add-btn {
    background: var(--amber); color: #000; border: none;
    font-family: var(--cond); font-weight: 900; font-size: 13px; letter-spacing: 1px;
    padding: 9px 18px; border-radius: 4px; cursor: pointer; transition: background .15s;
  }
  #add-btn:hover { background: var(--amber2); }

  /* ── TOOLBAR ── */
  #toolbar {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    background: var(--bg);
  }
  .cat-tabs { display: flex; gap: 4px; }
  .cat-tab {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: var(--mono); font-size: 10px; padding: 5px 10px; border-radius: 3px;
    cursor: pointer; letter-spacing: .5px; display: flex; align-items: center; gap: 5px;
    transition: all .15s;
  }
  .cat-tab .cnt { background: var(--surface2); border-radius: 3px; padding: 1px 5px; font-size: 9px; }
  .cat-tab:hover { border-color: var(--border2); color: #888; }
  .cat-tab.active { background: #f59e0b14; border-color: #f59e0b44; color: var(--amber); }
  #search-wrap { flex: 1; min-width: 140px; position: relative; display: flex; align-items: center; }
  #search-wrap .ico { position: absolute; left: 9px; color: var(--muted); font-size: 15px; }
  #search {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 7px 30px 7px 28px; outline: none; transition: border-color .15s;
  }
  #search:focus { border-color: #f59e0b44; }
  #search-clear { position: absolute; right: 8px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; display: none; }
  #sort-sel {
    background: var(--surface); border: 1px solid var(--border); color: #666;
    font-family: var(--mono); font-size: 10px; padding: 7px 10px; border-radius: 4px; outline: none;
  }

  /* ── GRID ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 10px; padding: 20px;
  }
  #empty {
    grid-column: 1/-1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 80px 0;
    color: var(--muted); font-size: 11px; letter-spacing: 2px; gap: 12px;
  }
  #empty .big { font-size: 44px; opacity: .15; }

  /* ── CARD ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 13px; cursor: pointer;
    display: flex; flex-direction: column; gap: 7px;
    transition: border-color .15s, background .15s;
    animation: fadeUp .2s ease both;
  }
  .card:hover { background: #111; border-color: var(--border2); }
  .card.out  { border-color: #f8717133; }
  .card.low  { border-color: #fb923c22; }
  .card-top  { display: flex; align-items: center; justify-content: space-between; }
  .cat-pill  { font-size: 10px; border: 1px solid; border-radius: 3px; padding: 2px 7px; letter-spacing: .5px; }
  .cat-pill.tool { color: var(--amber); border-color: #f59e0b33; }
  .cat-pill.book { color: var(--cyan); border-color: #22d3ee33; }
  .cat-pill.electronic { color: var(--violet); border-color: #a78bfa33; }
  .badge { font-size: 9px; border: 1px solid; border-radius: 3px; padding: 2px 6px; font-weight: 700; letter-spacing: 1px; }
  .badge.out { color: var(--red); border-color: #f8717133; background: #f871710d; }
  .badge.low { color: var(--orange); border-color: #fb923c33; background: #fb923c0d; }
  .badge.nfc-linked { color: var(--cyan); border-color: #22d3ee33; background: #22d3ee0d; }
  .card-name { color: #e5e5e5; font-weight: 700; font-size: 13px; line-height: 1.3; font-family: var(--cond); }
  .card-loc  { color: #3a3a3a; font-size: 10px; }
  .card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .qty-row   { display: flex; align-items: center; gap: 6px; }
  .qty-btn   {
    background: var(--surface2); border: 1px solid var(--border2); color: #666;
    width: 24px; height: 24px; border-radius: 4px; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); transition: all .1s; line-height: 1;
  }
  .qty-btn:hover { background: #252525; color: var(--amber); border-color: #f59e0b44; }
  .qty-val { font-family: var(--cond); font-size: 24px; font-weight: 900; min-width: 32px; text-align: center; line-height: 1; }
  .qty-val.ok   { color: var(--amber); }
  .qty-val.low  { color: var(--orange); }
  .qty-val.out  { color: var(--red); }
  .unit-lbl { font-size: 9px; color: var(--muted); letter-spacing: .5px; }
  .edit-btn  {
    background: none; border: 1px solid var(--border); color: var(--muted);
    width: 28px; height: 28px; border-radius: 4px; cursor: pointer;
    font-size: 13px; transition: all .15s;
  }
  .edit-btn:hover { background: var(--surface2); color: var(--amber); border-color: #f59e0b44; }

  /* ── MODAL ── */
  #overlay {
    display: none; position: fixed; inset: 0; background: #000000bb;
    z-index: 100; align-items: center; justify-content: center; padding: 16px;
  }
  #overlay.show { display: flex; }
  #modal {
    background: var(--surface); border: 1px solid #222; border-radius: 8px;
    padding: 22px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto;
    animation: slideUp .2s ease;
  }
  .panel-hdr {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .panel-hdr .title { flex: 1; color: #fff; font-family: var(--cond); font-weight: 700; font-size: 16px; letter-spacing: 1px; }
  .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
  .close-btn:hover { color: var(--text); }

  /* View panel */
  .info-grid { display: flex; flex-direction: column; gap: 0; margin-bottom: 16px; }
  .info-row  { display: flex; justify-content: space-between; border-bottom: 1px solid #141414; padding: 8px 0; }
  .info-lbl  { font-size: 9px; color: #444; letter-spacing: 1px; }
  .info-val  { font-size: 12px; color: #ccc; }
  .big-qty-wrap { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 18px 0; }
  .big-qty-btn {
    background: var(--surface2); border: 1px solid var(--border2); color: #666;
    width: 44px; height: 44px; border-radius: 8px; cursor: pointer;
    font-size: 24px; font-family: var(--mono); transition: all .1s;
  }
  .big-qty-btn:hover { background: #252525; color: var(--amber); border-color: #f59e0b44; }
  .big-qty-center { text-align: center; }
  .big-qty-num { font-family: var(--cond); font-size: 52px; font-weight: 900; line-height: 1; }
  .big-qty-unit { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

  /* NFC section in view */
  .nfc-section {
    border: 1px solid var(--border); border-radius: 6px; padding: 12px;
    margin-bottom: 16px; background: var(--surface2);
  }
  .nfc-section-title { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .nfc-id-box { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 11px; color: #666; margin-bottom: 10px; word-break: break-all; }
  .nfc-write-btn {
    background: #22d3ee12; border: 1px solid #22d3ee44; color: var(--cyan);
    font-family: var(--mono); font-size: 10px; padding: 8px 14px; border-radius: 4px;
    cursor: pointer; width: 100%; letter-spacing: 1px; transition: all .15s;
  }
  .nfc-write-btn:hover { background: #22d3ee1e; }
  .nfc-writing { animation: pulse-border 1.2s ease-in-out infinite; }

  /* Alert banner */
  .alert-banner { border-radius: 5px; padding: 8px 12px; font-size: 11px; margin-bottom: 14px; }
  .alert-out { background: #f871710d; border: 1px solid #f8717133; color: var(--red); }
  .alert-low { background: #fb923c0d; border: 1px solid #fb923c33; color: var(--orange); }

  /* Form */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 9px; color: #444; letter-spacing: 1.5px; }
  .field input, .field select, .field textarea {
    background: #111; border: 1px solid #222; border-radius: 4px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 10px; outline: none; transition: border-color .15s; width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #f59e0b44; }
  .field textarea { resize: vertical; min-height: 60px; }
  .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-row { display: flex; gap: 8px; margin-top: 6px; }
  .btn-primary {
    flex: 1; background: var(--amber); color: #000; border: none;
    font-family: var(--cond); font-weight: 900; font-size: 13px; letter-spacing: 1px;
    padding: 10px 0; border-radius: 4px; cursor: pointer; transition: background .15s;
  }
  .btn-primary:hover { background: var(--amber2); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary {
    flex: 1; background: none; color: #666; border: 1px solid var(--border2);
    font-family: var(--cond); font-weight: 700; font-size: 13px; letter-spacing: 1px;
    padding: 10px 0; border-radius: 4px; cursor: pointer; transition: all .15s;
  }
  .btn-secondary:hover { color: var(--text); border-color: #444; }
  .btn-danger {
    flex: 1; background: #f871710d; color: var(--red); border: 1px solid #f8717133;
    font-family: var(--cond); font-weight: 700; font-size: 13px; letter-spacing: 1px;
    padding: 10px 0; border-radius: 4px; cursor: pointer;
  }

  /* Confirm modal */
  #confirm-overlay {
    display: none; position: fixed; inset: 0; background: #000000cc;
    z-index: 200; align-items: center; justify-content: center; padding: 16px;
  }
  #confirm-overlay.show { display: flex; }
  #confirm-box {
    background: var(--surface); border: 1px solid #333; border-radius: 8px;
    padding: 28px; width: 100%; max-width: 340px; text-align: center;
    animation: slideUp .2s ease;
  }
  #confirm-box .warn-icon { font-size: 36px; margin-bottom: 8px; }
  #confirm-box .warn-title { color: var(--red); font-family: var(--cond); font-size: 18px; font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; }
  #confirm-box .warn-sub { color: var(--muted); font-size: 12px; margin-bottom: 22px; }

  /* NFC scanner overlay */
  #nfc-overlay {
    display: none; position: fixed; inset: 0;
    background: #000000ee; z-index: 300;
    align-items: center; justify-content: center; flex-direction: column; gap: 20px;
  }
  #nfc-overlay.show { display: flex; }
  .nfc-ring {
    width: 120px; height: 120px; border-radius: 50%;
    border: 2px solid var(--cyan); display: flex; align-items: center; justify-content: center;
    position: relative; animation: nfc-pulse 2s ease-in-out infinite;
  }
  .nfc-ring::before {
    content: ''; position: absolute; inset: -14px; border-radius: 50%;
    border: 1px solid #22d3ee33; animation: nfc-pulse 2s ease-in-out infinite .4s;
  }
  .nfc-ring::after {
    content: ''; position: absolute; inset: -28px; border-radius: 50%;
    border: 1px solid #22d3ee1a; animation: nfc-pulse 2s ease-in-out infinite .8s;
  }
  .nfc-ring-inner { font-size: 44px; }
  .nfc-status { color: var(--cyan); font-size: 12px; letter-spacing: 3px; }
  .nfc-sub { color: var(--muted); font-size: 11px; }
  .nfc-cancel-btn {
    background: none; border: 1px solid #333; color: #666; font-family: var(--mono);
    font-size: 11px; padding: 8px 20px; border-radius: 4px; cursor: pointer; margin-top: 8px;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--amber);
    border-radius: 6px; padding: 10px 18px; font-size: 12px; color: var(--text);
    display: flex; gap: 8px; align-items: center; z-index: 400;
    box-shadow: 0 4px 24px #000; pointer-events: none;
    opacity: 0; transition: opacity .2s;
  }
  #toast.show { opacity: 1; }
  #toast.warn { border-color: var(--orange); }
  #toast.err  { border-color: var(--red); }
  #toast.nfc  { border-color: var(--cyan); }

  /* Animations */
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse-border { 0%,100% { box-shadow: 0 0 0 0 #22d3ee22; } 50% { box-shadow: 0 0 0 6px #22d3ee11; } }
  @keyframes nfc-pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.04); } }

  @media (max-width: 500px) {
    #stats { display: none; }
    .form-grid2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <div id="logo">T&T</div>
  <div id="appTitle">
    <div class="name">TAP &amp; TRACK</div>
    <div class="sub">NFC INVENTORY SYSTEM</div>
  </div>
  <div id="stats">
    <div class="stat"><div class="val" id="stat-total" style="color:var(--amber)">0</div><div class="lbl">ARTICLES</div></div>
    <div class="stat"><div class="val" id="stat-low"   style="color:var(--orange)">0</div><div class="lbl">STOCK BAS</div></div>
    <div class="stat"><div class="val" id="stat-out"   style="color:var(--red)">0</div><div class="lbl">ÉPUISÉ</div></div>
  </div>
  <button id="nfc-btn" onclick="toggleNfcScan()">
    <span id="nfc-btn-icon">⬡</span> <span id="nfc-btn-label">SCAN NFC</span>
  </button>
  <button id="add-btn" onclick="openAdd()">+ AJOUTER</button>
</header>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="cat-tabs">
    <button class="cat-tab active" data-cat="all"        onclick="setFilter('all')">◈ TOUT <span class="cnt" id="cnt-all">0</span></button>
    <button class="cat-tab"        data-cat="tool"       onclick="setFilter('tool')">⚙ OUTILS <span class="cnt" id="cnt-tool">0</span></button>
    <button class="cat-tab"        data-cat="book"       onclick="setFilter('book')">▣ LIVRES <span class="cnt" id="cnt-book">0</span></button>
    <button class="cat-tab"        data-cat="electronic" onclick="setFilter('electronic')">⬡ COMPOSANTS <span class="cnt" id="cnt-electronic">0</span></button>
  </div>
  <div id="search-wrap">
    <span class="ico">⌕</span>
    <input id="search" placeholder="Rechercher…" oninput="onSearch(this.value)">
    <button id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <select id="sort-sel" onchange="render()">
    <option value="name">Trier : Nom</option>
    <option value="qty">Trier : Quantité</option>
    <option value="cat">Trier : Catégorie</option>
  </select>
</div>

<!-- GRID -->
<main id="grid"></main>

<!-- MODAL OVERLAY -->
<div id="overlay" onclick="closeModal()">
  <div id="modal" onclick="event.stopPropagation()"></div>
</div>

<!-- CONFIRM OVERLAY -->
<div id="confirm-overlay" onclick="closeConfirm()">
  <div id="confirm-box" onclick="event.stopPropagation()">
    <div class="warn-icon">⚠</div>
    <div class="warn-title">SUPPRIMER ?</div>
    <div class="warn-sub">Cette action est irréversible.</div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn-secondary" onclick="closeConfirm()">ANNULER</button>
      <button class="btn-danger"    id="confirm-ok">SUPPRIMER</button>
    </div>
  </div>
</div>

<!-- NFC SCANNING OVERLAY -->
<div id="nfc-overlay">
  <div class="nfc-ring"><div class="nfc-ring-inner">⬡</div></div>
  <div class="nfc-status" id="nfc-overlay-status">EN ATTENTE D'UN TAG NFC…</div>
  <div class="nfc-sub" id="nfc-overlay-sub">Approchez un tag NFC du capteur</div>
  <button class="nfc-cancel-btn" onclick="cancelNfcScan()">ANNULER</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'taptrack-v2';
const CAT_META = {
  tool:       { label:'Outil',      icon:'⚙', color:'var(--amber)' },
  book:       { label:'Livre',      icon:'▣', color:'var(--cyan)'  },
  electronic: { label:'Composant',  icon:'⬡', color:'var(--violet)'},
};
const UNITS = {
  tool:       ['pièce','unité','lot'],
  book:       ['exemplaire','tome','volume'],
  electronic: ['pièce','pack','boîte','rouleau','m'],
};
const SAMPLES = [
  {id:'tt-1',name:'Perceuse Bosch GSB 18V',   category:'tool',       qty:2,  unit:'pièce',       location:'Étagère A1',   minQty:1, note:'Batteries chargées', nfcLinked:false},
  {id:'tt-2',name:'Tournevis Wera 6000',       category:'tool',       qty:12, unit:'pièce',       location:'Tiroir B3',    minQty:5, note:'',                   nfcLinked:false},
  {id:'tt-3',name:'Clean Code — R. Martin',    category:'book',       qty:3,  unit:'exemplaire',  location:'Bibliothèque', minQty:1, note:'Édition 2008',        nfcLinked:false},
  {id:'tt-4',name:'Raspberry Pi 4 (4GB)',      category:'electronic', qty:5,  unit:'pièce',       location:'Boîte D2',     minQty:2, note:'',                   nfcLinked:false},
  {id:'tt-5',name:'Résistances 10kΩ',          category:'electronic', qty:480,unit:'pièce',       location:'Boîte D5',     minQty:100,note:'0.25W',             nfcLinked:false},
  {id:'tt-6',name:'Le Petit Prince',           category:'book',       qty:0,  unit:'exemplaire',  location:'Bibliothèque', minQty:1, note:'En réappro',          nfcLinked:false},
  {id:'tt-7',name:'Niveau à bulle 60cm',       category:'tool',       qty:1,  unit:'pièce',       location:'Étagère A2',   minQty:1, note:'',                   nfcLinked:false},
];

let items   = [];
let filter  = 'all';
let search  = '';
let nfcReader = null;
let nfcScanMode = 'open'; // 'open' | 'write'
let nfcWriteItemId = null;
let toastTimer = null;

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    items = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(SAMPLES));
  } catch { items = JSON.parse(JSON.stringify(SAMPLES)); }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const sortBy = document.getElementById('sort-sel').value;
  // stats
  document.getElementById('stat-total').textContent = items.length;
  document.getElementById('stat-low').textContent   = items.filter(i=>i.qty>0&&i.qty<=i.minQty).length;
  document.getElementById('stat-out').textContent   = items.filter(i=>i.qty===0).length;
  // counts
  document.getElementById('cnt-all').textContent        = items.length;
  document.getElementById('cnt-tool').textContent       = items.filter(i=>i.category==='tool').length;
  document.getElementById('cnt-book').textContent       = items.filter(i=>i.category==='book').length;
  document.getElementById('cnt-electronic').textContent = items.filter(i=>i.category==='electronic').length;
  // filter + search
  const q = search.toLowerCase();
  let list = items
    .filter(i => filter==='all' || i.category===filter)
    .filter(i => !q || i.name.toLowerCase().includes(q) || i.location.toLowerCase().includes(q) || i.note.toLowerCase().includes(q));
  // sort
  list.sort((a,b) => sortBy==='name' ? a.name.localeCompare(b.name) :
                     sortBy==='qty'  ? b.qty-a.qty :
                     a.category.localeCompare(b.category));
  // render cards
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<div id="empty"><div class="big">◈</div><div>AUCUN ARTICLE TROUVÉ</div></div>';
    return;
  }
  list.forEach(item => {
    const isOut = item.qty===0, isLow = !isOut && item.qty<=item.minQty;
    const meta  = CAT_META[item.category];
    const qClass= isOut?'out':isLow?'low':'ok';
    const div = document.createElement('div');
    div.className = 'card'+(isOut?' out':isLow?' low':'');
    div.dataset.id = item.id;
    div.innerHTML = `
      <div class="card-top">
        <span class="cat-pill ${item.category}">${meta.icon} ${meta.label}</span>
        <div style="display:flex;gap:4px">
          ${item.nfcLinked?'<span class="badge nfc-linked">NFC</span>':''}
          ${isOut?'<span class="badge out">ÉPUISÉ</span>':isLow?'<span class="badge low">BAS</span>':''}
        </div>
      </div>
      <div class="card-name">${esc(item.name)}</div>
      ${item.location?`<div class="card-loc">📍 ${esc(item.location)}</div>`:''}
      <div class="card-bottom">
        <div class="qty-row">
          <button class="qty-btn" onclick="adjustQty('${item.id}',-1,event)">−</button>
          <span class="qty-val ${qClass}">${item.qty}</span>
          <button class="qty-btn" onclick="adjustQty('${item.id}',+1,event)">+</button>
          <span class="unit-lbl">${esc(item.unit)}</span>
        </div>
        <button class="edit-btn" onclick="openEdit('${item.id}',event)">✎</button>
      </div>`;
    div.addEventListener('click', () => openView(item.id));
    grid.appendChild(div);
  });
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── FILTER / SEARCH ─────────────────────────────────────────────────────────
function setFilter(cat) {
  filter = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
  render();
}
function onSearch(val) {
  search = val;
  document.getElementById('search-clear').style.display = val ? 'block' : 'none';
  render();
}
function clearSearch() {
  search = ''; document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  render();
}

// ─── QTY ADJUST ──────────────────────────────────────────────────────────────
function adjustQty(id, delta, e) {
  if (e) e.stopPropagation();
  const item = items.find(i=>i.id===id);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  save(); render();
  if (document.getElementById('overlay').classList.contains('show')) openView(id);
}

// ─── MODAL HELPERS ───────────────────────────────────────────────────────────
function showModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ─── VIEW PANEL ──────────────────────────────────────────────────────────────
function openView(id) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  const meta   = CAT_META[item.category];
  const isOut  = item.qty===0, isLow = !isOut && item.qty<=item.minQty;
  const qClass = isOut?'out':isLow?'low':'ok';
  showModal(`
    <div class="panel-hdr">
      <span style="color:${meta.color};font-size:20px">${meta.icon}</span>
      <span class="title">${esc(item.name)}</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="info-grid">
      <div class="info-row"><span class="info-lbl">CATÉGORIE</span><span class="info-val">${meta.label}</span></div>
      <div class="info-row"><span class="info-lbl">EMPLACEMENT</span><span class="info-val">${esc(item.location||'—')}</span></div>
      <div class="info-row"><span class="info-lbl">UNITÉ</span><span class="info-val">${esc(item.unit)}</span></div>
      <div class="info-row"><span class="info-lbl">SEUIL MIN.</span><span class="info-val">${item.minQty}</span></div>
      ${item.note?`<div class="info-row"><span class="info-lbl">NOTE</span><span class="info-val">${esc(item.note)}</span></div>`:''}
    </div>
    <div class="big-qty-wrap">
      <button class="big-qty-btn" onclick="adjustQty('${id}',-1)">−</button>
      <div class="big-qty-center">
        <div id="view-qty" class="big-qty-num ${qClass}">${item.qty}</div>
        <div class="big-qty-unit">${esc(item.unit).toUpperCase()}</div>
      </div>
      <button class="big-qty-btn" onclick="adjustQty('${id}',+1)">+</button>
    </div>
    ${isOut?`<div class="alert-banner alert-out">⚠ STOCK ÉPUISÉ — réapprovisionnement requis</div>`
           :isLow?`<div class="alert-banner alert-low">⚠ STOCK BAS — en dessous du seuil minimum</div>`:''}
    <div class="nfc-section">
      <div class="nfc-section-title">⬡ NFC TAG</div>
      <div class="nfc-id-box">ID : ${item.id}</div>
      <button class="nfc-write-btn" id="write-nfc-btn" onclick="startNfcWrite('${id}')">
        ${item.nfcLinked ? '↺ RÉÉCRIRE SUR TAG NFC' : '⬡ ÉCRIRE SUR TAG NFC'}
      </button>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="openDeleteConfirm('${id}')">🗑 Supprimer</button>
      <button class="btn-primary"   onclick="openEdit('${id}')">✎ Modifier</button>
    </div>
  `);
}

// ─── EDIT / ADD FORM ─────────────────────────────────────────────────────────
function openAdd() {
  renderForm({ id:'tt-'+Date.now(), name:'', category:'tool', qty:1, unit:'pièce', location:'', minQty:1, note:'', nfcLinked:false }, 'add');
}
function openEdit(id, e) {
  if (e) e.stopPropagation();
  const item = items.find(i=>i.id===id);
  if (item) renderForm({...item}, 'edit');
}
function renderForm(data, mode) {
  const unitOpts = cat => (UNITS[cat]||UNITS.tool).map(u=>`<option value="${u}" ${u===data.unit?'selected':''}>${u}</option>`).join('');
  showModal(`
    <div class="panel-hdr">
      <span style="color:var(--amber);font-size:18px">◈</span>
      <span class="title">${mode==='add'?'NOUVEL ARTICLE':'MODIFIER'}</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="field">
        <label>NOM *</label>
        <input id="f-name" value="${esc(data.name)}" placeholder="ex: Perceuse Makita 18V">
      </div>
      <div class="form-grid2">
        <div class="field">
          <label>CATÉGORIE</label>
          <select id="f-cat" onchange="onCatChange()">
            <option value="tool"       ${data.category==='tool'?'selected':''}>⚙ Outil</option>
            <option value="book"       ${data.category==='book'?'selected':''}>▣ Livre</option>
            <option value="electronic" ${data.category==='electronic'?'selected':''}>⬡ Composant</option>
          </select>
        </div>
        <div class="field">
          <label>UNITÉ</label>
          <select id="f-unit">${unitOpts(data.category)}</select>
        </div>
      </div>
      <div class="form-grid2">
        <div class="field"><label>QUANTITÉ</label><input id="f-qty" type="number" min="0" value="${data.qty}"></div>
        <div class="field"><label>SEUIL MIN.</label><input id="f-min" type="number" min="0" value="${data.minQty}"></div>
      </div>
      <div class="field"><label>EMPLACEMENT</label><input id="f-loc" value="${esc(data.location)}" placeholder="ex: Étagère A3, Tiroir B1…"></div>
      <div class="field"><label>NOTE</label><textarea id="f-note">${esc(data.note)}</textarea></div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="closeModal()">ANNULER</button>
        <button class="btn-primary" id="save-btn" onclick="saveForm('${data.id}','${mode}')">
          ${mode==='add'?'✓ AJOUTER':'✓ ENREGISTRER'}
        </button>
      </div>
    </div>
  `);
  document.getElementById('f-name').addEventListener('input', () => {
    document.getElementById('save-btn').disabled = !document.getElementById('f-name').value.trim();
  });
  document.getElementById('save-btn').disabled = !data.name.trim();
}
function onCatChange() {
  const cat  = document.getElementById('f-cat').value;
  const sel  = document.getElementById('f-unit');
  sel.innerHTML = (UNITS[cat]||UNITS.tool).map(u=>`<option value="${u}">${u}</option>`).join('');
}
function saveForm(id, mode) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const item = {
    id, name,
    category: document.getElementById('f-cat').value,
    qty:      Number(document.getElementById('f-qty').value)||0,
    unit:     document.getElementById('f-unit').value,
    location: document.getElementById('f-loc').value.trim(),
    minQty:   Number(document.getElementById('f-min').value)||0,
    note:     document.getElementById('f-note').value.trim(),
    nfcLinked: mode==='edit' ? (items.find(i=>i.id===id)||{}).nfcLinked||false : false,
  };
  if (mode==='add') {
    items.unshift(item);
    showToast(`« ${name} » ajouté`);
  } else {
    const idx = items.findIndex(i=>i.id===id);
    if (idx>=0) items[idx] = item;
    showToast(`« ${name} » mis à jour`);
  }
  save(); render(); closeModal();
}

// ─── DELETE ──────────────────────────────────────────────────────────────────
let pendingDelete = null;
function openDeleteConfirm(id) {
  pendingDelete = id;
  document.getElementById('confirm-overlay').classList.add('show');
  document.getElementById('confirm-ok').onclick = () => deleteItem(pendingDelete);
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
  pendingDelete = null;
}
function deleteItem(id) {
  const item = items.find(i=>i.id===id);
  items = items.filter(i=>i.id!==id);
  save(); render(); closeConfirm(); closeModal();
  showToast(`« ${item?.name} » supprimé`, 'warn');
}

// ─── NFC ─────────────────────────────────────────────────────────────────────
const NFC_PREFIX = 'taptrack:';
const nfcSupported = () => 'NDEFReader' in window;

/* ── Toggle global scan mode ── */
async function toggleNfcScan() {
  if (nfcReader) { cancelNfcScan(); return; }
  if (!nfcSupported()) { showToast('NFC non supporté sur cet appareil/navigateur', 'err'); return; }
  nfcScanMode = 'open';
  nfcWriteItemId = null;
  await startNfcReader();
}

/* ── Start write mode for a specific item ── */
async function startNfcWrite(id) {
  if (!nfcSupported()) { showToast('NFC non supporté', 'err'); return; }
  nfcScanMode = 'write';
  nfcWriteItemId = id;
  closeModal();
  showNfcOverlay('APPROCHEZ LE TAG NFC…', 'L\'écriture démarrera automatiquement');
  try {
    const writer = new NDEFReader();
    await writer.write({ records: [{ recordType: 'text', data: NFC_PREFIX + id }] });
    hideNfcOverlay();
    const item = items.find(i=>i.id===id);
    if (item) { item.nfcLinked = true; save(); render(); }
    showToast('⬡ Tag NFC écrit avec succès !', 'nfc');
    openView(id);
  } catch(err) {
    hideNfcOverlay();
    if (err.name !== 'AbortError') showToast('Écriture NFC échouée : '+err.message, 'err');
  }
}

/* ── Start reader ── */
async function startNfcReader() {
  try {
    nfcReader = new NDEFReader();
    await nfcReader.scan();
    nfcReader.onreadingerror = () => showToast('Erreur de lecture NFC', 'err');
    nfcReader.onreading = ({ message }) => {
      for (const record of message.records) {
        if (record.recordType === 'text') {
          const decoder = new TextDecoder(record.encoding || 'utf-8');
          const text = decoder.decode(record.data);
          if (text.startsWith(NFC_PREFIX)) {
            const id = text.slice(NFC_PREFIX.length);
            const item = items.find(i=>i.id===id);
            cancelNfcScan();
            if (item) {
              showToast('⬡ Tag lu : '+item.name, 'nfc');
              openView(id);
            } else {
              showToast('Tag NFC non reconnu', 'warn');
            }
            return;
          }
        }
      }
      showToast('Tag NFC non reconnu (format inconnu)', 'warn');
    };
    // update button
    const btn = document.getElementById('nfc-btn');
    btn.classList.add('active');
    document.getElementById('nfc-btn-icon').textContent = '◉';
    document.getElementById('nfc-btn-label').textContent = 'SCAN ACTIF';
    showNfcOverlay('EN ATTENTE D\'UN TAG NFC…', 'Approchez un tag NFC du capteur');
  } catch(err) {
    nfcReader = null;
    if (err.name === 'AbortError') return;
    if (err.name === 'NotAllowedError') showToast('Permission NFC refusée', 'err');
    else showToast('NFC : '+err.message, 'err');
  }
}

function cancelNfcScan() {
  nfcReader = null;
  hideNfcOverlay();
  const btn = document.getElementById('nfc-btn');
  btn.classList.remove('active');
  document.getElementById('nfc-btn-icon').textContent = '⬡';
  document.getElementById('nfc-btn-label').textContent = 'SCAN NFC';
}

function showNfcOverlay(status, sub) {
  document.getElementById('nfc-overlay-status').textContent = status;
  document.getElementById('nfc-overlay-sub').textContent = sub;
  document.getElementById('nfc-overlay').classList.add('show');
}
function hideNfcOverlay() {
  document.getElementById('nfc-overlay').classList.remove('show');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, type='ok') {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  const icons = {ok:'✓', warn:'⚠', err:'✕', nfc:'⬡'};
  el.className = 'show '+(type||'ok');
  el.innerHTML = `<span style="color:${type==='warn'?'var(--orange)':type==='err'?'var(--red)':type==='nfc'?'var(--cyan)':'var(--amber)'}">${icons[type]||'✓'}</span> ${esc(msg)}`;
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
load();
render();

// NFC support indicator
if (!nfcSupported()) {
  document.getElementById('nfc-btn').title = 'NFC non disponible (Chrome Android requis)';
  document.getElementById('nfc-btn').style.opacity = '.4';
}
</script>
</body>
