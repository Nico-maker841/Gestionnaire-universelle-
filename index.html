<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00d4ff">
    <title>Tap & Track • NFC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { --primary: #00d4ff; }
        * { font-family: 'Inter', system_ui, sans-serif; }
        
        .tap-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tap-btn:active {
            transform: scale(0.92);
            box-shadow: 0 0 0 12px rgba(0, 212, 255, 0.4);
        }
        
        .nfc-animation {
            animation: nfcPulse 1.4s infinite ease-in-out;
        }
        @keyframes nfcPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }
        
        .stock-bar {
            height: 6px;
            background: linear-gradient(90deg, #00d4ff var(--stock-level), #334155 var(--stock-level));
            border-radius: 9999px;
        }

        /* OPTIMISATIONS MOBILE */
        @media (max-width: 768px) {
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            th, td { padding: 14px 10px !important; font-size: 15px; white-space: nowrap; }
            .tap-btn { width: 48px !important; height: 48px !important; font-size: 1.4rem; }
            .header-stats { font-size: 1.1rem; }
            .main-content { padding-bottom: 100px; } /* espace pour les boutons flottants */
        }
        
        .drawer {
            animation: slideIn 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen pb-20">
    <!-- HEADER MOBILE-FRIENDLY -->
    <header class="bg-black border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <!-- Logo + Hamburger -->
            <div class="flex items-center gap-x-3">
                <button onclick="toggleMobileDrawer()" class="lg:hidden p-2 -ml-2">
                    <i class="fa-solid fa-bars text-3xl"></i>
                </button>
                <div class="w-9 h-9 bg-[#00d4ff] text-black rounded-2xl flex items-center justify-center text-3xl">📟</div>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">Tap &amp; Track</h1>
                    <p class="text-xs text-emerald-400 flex items-center gap-1">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
                        </span>
                        NFC • LIVE
                    </p>
                </div>
            </div>

            <!-- Stats compactes -->
            <div onclick="showStatsModal()" class="flex items-center gap-x-4 header-stats cursor-pointer">
                <div class="text-center">
                    <div id="total-items" class="text-xl font-semibold text-[#00d4ff]">8</div>
                    <div class="text-[10px] text-gray-400">ARTICLES</div>
                </div>
                <div class="text-center">
                    <div id="total-stock" class="text-xl font-semibold">306</div>
                    <div class="text-[10px] text-gray-400">EN STOCK</div>
                </div>
                <div class="text-center">
                    <div id="low-stock-count" class="text-xl font-semibold text-emerald-400">0</div>
                    <div class="text-[10px] text-gray-400">STOCK BAS</div>
                </div>
            </div>

            <!-- Boutons header -->
            <div class="flex items-center gap-x-3">
                <button onclick="startNFCTap()" 
                        class="flex items-center gap-x-2 bg-gradient-to-r from-[#00d4ff] to-cyan-400 text-black font-semibold px-5 h-10 rounded-3xl text-sm lg:hidden">
                    <i class="fa-solid fa-nfc-symbol"></i>
                    <span>TAP NFC</span>
                </button>

                <button onclick="simulateScan()" class="flex items-center gap-x-2 bg-white/10 hover:bg-white/20 px-4 h-10 rounded-3xl text-sm">
                    <i class="fa-solid fa-barcode"></i>
                    <span class="hidden sm:inline">Scanner</span>
                </button>

                <div class="w-8 h-8 bg-emerald-400 text-black rounded-2xl flex items-center justify-center text-xl">👷</div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
        
        <!-- SIDEBAR → Drawer sur mobile -->
        <div id="sidebar" class="hidden lg:block w-72 flex-shrink-0 bg-white/5 backdrop-blur-xl rounded-3xl p-5 sticky top-6 h-fit">
            <!-- Catégories (même contenu que avant) -->
            <h2 class="uppercase text-xs tracking-[1px] text-gray-400 mb-4 px-3">Catégories</h2>
            <div onclick="filterByCategory('all');closeMobileDrawer()" id="cat-all" class="category-tab flex items-center gap-x-3 px-4 py-4 rounded-2xl bg-white/10 mb-2 cursor-pointer">
                <i class="fa-solid fa-boxes-stacked text-[#00d4ff]"></i>
                <span class="font-medium flex-1">Tout le matériel</span>
                <span id="count-all" class="text-xs bg-white/20 px-3 py-1 rounded-2xl">8</span>
            </div>
            <!-- Autres catégories identiques au code précédent -->
            <div onclick="filterByCategory('Outils');closeMobileDrawer()" id="cat-outils" class="category-tab flex items-center gap-x-3 px-4 py-4 rounded-2xl hover:bg-white/10 mb-2 cursor-pointer">
                <i class="fa-solid fa-screwdriver-wrench text-amber-400"></i>
                <span class="font-medium flex-1">Outils</span>
                <span id="count-outils" class="text-xs bg-white/20 px-3 py-1 rounded-2xl">3</span>
            </div>
            <div onclick="filterByCategory('Livres');closeMobileDrawer()" id="cat-livres" class="category-tab flex items-center gap-x-3 px-4 py-4 rounded-2xl hover:bg-white/10 mb-2 cursor-pointer">
                <i class="fa-solid fa-book text-purple-400"></i>
                <span class="font-medium flex-1">Livres</span>
                <span id="count-livres" class="text-xs bg-white/20 px-3 py-1 rounded-2xl">2</span>
            </div>
            <div onclick="filterByCategory('Composants électroniques');closeMobileDrawer()" id="cat-composants" class="category-tab flex items-center gap-x-3 px-4 py-4 rounded-2xl hover:bg-white/10 mb-2 cursor-pointer">
                <i class="fa-solid fa-microchip text-cyan-400"></i>
                <span class="font-medium flex-1">Composants électroniques</span>
                <span id="count-composants" class="text-xs bg-white/20 px-3 py-1 rounded-2xl">3</span>
            </div>

            <div class="h-px bg-white/10 my-6"></div>
            <button onclick="showAddModal();closeMobileDrawer()" class="w-full h-12 bg-[#00d4ff] text-black font-semibold rounded-3xl flex items-center justify-center gap-x-3 text-lg mb-3">
                <i class="fa-solid fa-plus"></i>
                <span>Ajouter un article</span>
            </button>
            <button onclick="exportCSV();closeMobileDrawer()" class="w-full h-12 border border-white/30 hover:border-white/60 font-medium rounded-3xl flex items-center justify-center gap-x-3">
                <i class="fa-solid fa-file-export"></i>
                <span>Exporter CSV</span>
            </button>
        </div>

        <!-- CONTENU PRINCIPAL -->
        <div class="flex-1 main-content">
            <!-- Recherche + filtres -->
            <div class="flex flex-col sm:flex-row gap-3 mb-6">
                <div class="flex-1 relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="search-input" onkeyup="if(event.keyCode===13) filterTable()" 
                           type="text" placeholder="Rechercher ou scanner NFC…" 
                           class="w-full bg-white/10 border border-white/10 focus:border-[#00d4ff] rounded-3xl h-12 pl-12 pr-6 text-white placeholder-gray-400 outline-none text-base">
                </div>
                <select id="sort-select" onchange="filterTable()" class="bg-white/10 border border-white/10 rounded-3xl px-6 py-3 outline-none text-sm">
                    <option value="name">Nom A-Z</option>
                    <option value="quantity">Quantité ↓</option>
                    <option value="last_updated">Dernier scan</option>
                </select>
                <button onclick="toggleLowStock()" id="low-stock-filter"
                        class="px-6 bg-orange-400/10 hover:bg-orange-400/20 text-orange-400 rounded-3xl font-medium flex items-center gap-2 whitespace-nowrap">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span class="text-sm">Stock bas</span>
                </button>
            </div>

            <!-- TABLEAU / LISTE -->
            <div class="bg-white/5 backdrop-blur-xl rounded-3xl table-container">
                <table class="w-full min-w-[700px]" id="inventory-table">
                    <thead>
                        <tr class="border-b border-white/10 text-xs uppercase tracking-widest text-gray-400">
                            <th class="text-left py-4 px-6">Article</th>
                            <th class="text-left py-4 px-6">Catégorie</th>
                            <th class="text-left py-4 px-6">Quantité</th>
                            <th class="text-left py-4 px-6">Emplacement</th>
                            <th class="text-left py-4 px-6">Tag NFC</th>
                            <th class="text-right py-4 px-6">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-sm divide-y divide-white/10"></tbody>
                </table>
            </div>

            <p class="text-xs text-center text-gray-500 mt-8">✅ Sauvegarde automatique • NFC synchronisé</p>
        </div>
    </div>

    <!-- DRAWER MOBILE -->
    <div onclick="if(event.target.id === 'mobile-drawer')closeMobileDrawer()" id="mobile-drawer" class="hidden fixed inset-0 bg-black/80 z-[99999] lg:hidden">
        <div onclick="event.stopImmediatePropagation()" class="drawer absolute bottom-0 left-0 right-0 bg-gray-900 rounded-t-3xl max-h-[85vh] overflow-auto">
            <div class="px-6 py-5 border-b border-white/10 flex items-center justify-between sticky top-0 bg-gray-900 z-10">
                <h2 class="text-xl font-semibold">Menu • Tap &amp; Track</h2>
                <button onclick="closeMobileDrawer()" class="text-4xl leading-none text-gray-400">×</button>
            </div>
            <div class="p-6 space-y-2">
                <!-- Même catégories que le sidebar -->
                <div onclick="filterByCategory('all');closeMobileDrawer()" class="category-tab flex items-center gap-x-4 px-5 py-5 rounded-3xl bg-white/10">
                    <i class="fa-solid fa-boxes-stacked text-2xl text-[#00d4ff]"></i>
                    <span class="flex-1 font-medium text-lg">Tout le matériel</span>
                    <span id="count-all-mobile" class="text-sm bg-white/20 px-4 py-2 rounded-3xl">8</span>
                </div>
                <!-- Copier les autres catégories ici (identiques au code) -->
                <!-- Pour gagner de la place, je les ai omis dans cet exemple mais tu les copies du sidebar -->
                <div class="pt-6">
                    <button onclick="showAddModal();closeMobileDrawer()" class="w-full h-14 bg-[#00d4ff] text-black font-semibold rounded-3xl text-lg flex items-center justify-center gap-3">
                        <i class="fa-solid fa-plus"></i> Ajouter un article + NFC
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- BOUTONS FLOTTANTS MOBILE (thumb-friendly) -->
    <div class="fixed bottom-6 right-6 flex flex-col gap-4 z-[9999] lg:hidden">
        <button onclick="startNFCTap()" 
                class="w-16 h-16 bg-gradient-to-br from-[#00d4ff] to-cyan-400 rounded-3xl shadow-2xl shadow-cyan-500/50 flex items-center justify-center text-4xl text-black tap-btn">
            <i class="fa-solid fa-nfc-symbol"></i>
        </button>
        <button onclick="showAddModal()" 
                class="w-16 h-16 bg-emerald-400 rounded-3xl shadow-2xl flex items-center justify-center text-4xl text-black tap-btn">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- MODALS (inchangés) + le reste du script NFC, add, etc. -->
    <!-- Pour ne pas surcharger ce message, je te donne la partie critique. 
         Colle tout le reste du script de ma précédente version (base de données, renderTable, NFC, etc.) 
         juste avant la balise </body> -->

    <script>
        // === TOUT LE JAVASCRIPT PRÉCÉDENT (base de données, NFC, renderTable, etc.) ===
        // Copie-colle ici tout le <script> de la version NFC que je t'ai donnée précédemment
        // (les variables inventory, saveDB, renderTable, tapItem, startNFCTap, etc.)

        // AJOUTS MOBILE
        function toggleMobileDrawer() {
            document.getElementById('mobile-drawer').classList.toggle('hidden')
            document.getElementById('mobile-drawer').classList.toggle('flex')
        }
        function closeMobileDrawer() {
            const drawer = document.getElementById('mobile-drawer')
            drawer.classList.add('hidden')
            drawer.classList.remove('flex')
        }

        // Mise à jour des compteurs mobiles
        function updateMobileCounts() {
            // Même logique que updateGlobalStats mais pour les ID *-mobile
            // (tu peux réutiliser la même fonction)
        }

        // Initialisation optimisée
        function init() {
            updateGlobalStats()
            renderTable(inventory)
            console.log('%c🚀 Tap & Track OPTIMISÉ MOBILE chargé !', 'background:#00d4ff;color:#000;padding:4px 8px;border-radius:9999px')
        }
        window.onload = init
    </script>
</body>
</html>
